<title>Budżet</title>
<script type="module">
// ===== FIREBASE =====
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCNTGXMl3oQZAUCerFnTVwOql1cWJxGEb4",
  authDomain: "budzet-4f077.firebaseapp.com",
  projectId: "budzet-4f077",
  storageBucket: "budzet-4f077.firebasestorage.app",
  messagingSenderId: "486552039745",
  appId: "1:486552039745:web:0fccaa4bd98015fc7031c0"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window._fbExpenses = [];
window._fbAddExpense = null;

const CORRECT_PIN = '2137'; // <-- zmień PIN tutaj

function startApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-root').style.display = 'flex';

  const expensesCol = collection(db, 'expenses');
  const q = query(expensesCol, orderBy('createdAt', 'desc'));
  onSnapshot(q, (snapshot) => {
    window._fbExpenses = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    if (typeof renderDashboard === 'function') renderDashboard();
    if (typeof renderHistory === 'function') renderHistory();
  });
  window._fbAddExpense = async (expense) => {
    await addDoc(expensesCol, { ...expense, createdAt: serverTimestamp() });
  };

  if (typeof renderDashboard === 'function') renderDashboard();
  if (typeof renderHistory === 'function') renderHistory();
  if (typeof renderSettings === 'function') renderSettings();
}

// Sprawdź czy już zalogowany
if (localStorage.getItem('pin_ok') === '1') {
  document.addEventListener('DOMContentLoaded', () => startApp());
} else {
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app-root').style.display = 'none';
  });
}

window._checkPin = (pin) => {
  if (pin === CORRECT_PIN) {
    localStorage.setItem('pin_ok', '1');
    startApp();
  } else {
    const dots = document.querySelectorAll('.pin-dot');
    dots.forEach(d => d.classList.add('shake'));
    setTimeout(() => {
      dots.forEach(d => { d.classList.remove('shake'); d.classList.remove('filled'); });
      window._pinBuffer = '';
    }, 500);
  }
};

window._pinBuffer = '';
window._pinPress = (digit) => {
  if (window._pinBuffer.length >= 4) return;
  window._pinBuffer += digit;
  const dots = document.querySelectorAll('.pin-dot');
  dots.forEach((d, i) => d.classList.toggle('filled', i < window._pinBuffer.length));
  if (window._pinBuffer.length === 4) {
    setTimeout(() => window._checkPin(window._pinBuffer), 150);
  }
};
window._pinBackspace = () => {
  if (window._pinBuffer.length === 0) return;
  window._pinBuffer = window._pinBuffer.slice(0, -1);
  const dots = document.querySelectorAll('.pin-dot');
  dots.forEach((d, i) => d.classList.toggle('filled', i < window._pinBuffer.length));
};
</script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap');

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #E4E4ED;
  --bg-light: #EEEEF6;
  --bg-card: #E8E8F0;
  --shadow-light: #F4F4FC;
  --shadow-dark: #C8C8D4;
  --shadow-darker: #B8B8C6;
  --accent: #8B5CF6;
  --accent-light: #A78BFA;
  --accent-dark: #7C3AED;
  --accent-pink: #E879A8;
  --accent-glow: rgba(139, 92, 246, 0.25);
  --text: #2D2D3A;
  --text-sec: #8E8E9E;
  --text-light: #A8A8B8;
  --coral: #E8735A;
  --red: #DC4444;
  --green: #4CAF7D;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html { height: 100%; width: 100%; overflow: hidden; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100%;
  width: 100%;
  overflow: hidden;
  position: fixed;
  inset: 0;
  margin: 0;
  padding: 0;
  -webkit-font-smoothing: antialiased;
  -webkit-text-size-adjust: 100%;
}

/* Neumorphic utilities */
.neu-raised {
  background: var(--bg-card);
  border-radius: 20px;
  box-shadow:
    8px 8px 16px var(--shadow-dark),
    -8px -8px 16px var(--shadow-light),
    inset 0 1px 0 rgba(255,255,255,0.35);
}
.neu-raised-sm {
  background: var(--bg-card);
  border-radius: 14px;
  box-shadow:
    5px 5px 10px var(--shadow-dark),
    -5px -5px 10px var(--shadow-light),
    inset 0 1px 0 rgba(255,255,255,0.3);
}
.neu-inset {
  border-radius: 14px;
  box-shadow:
    inset 4px 4px 8px var(--shadow-dark),
    inset -4px -4px 8px var(--shadow-light);
  background: var(--bg);
}
.neu-flat {
  background: var(--bg-card);
  border-radius: 14px;
  box-shadow:
    3px 3px 6px var(--shadow-dark),
    -3px -3px 6px var(--shadow-light);
}

/* App container */
#app {
  height: 100%;
  display: flex;
  flex-direction: column;
  width: 100%;
  max-width: 100%;
  margin: 0;
  position: relative;
  overflow: hidden;
}

/* Screen container */
.screens {
  flex: 1;
  overflow: hidden;
  position: relative;
}
.screen {
  position: absolute;
  inset: 0;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 0 16px 100px;
  opacity: 0;
  transform: translateY(12px);
  pointer-events: none;
  transition: opacity 0.35s ease, transform 0.35s ease;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.screen::-webkit-scrollbar { display: none; }
.screen.active {
  opacity: 1;
  transform: translateY(0);
  pointer-events: all;
}

/* ===== TAB BAR ===== */
.tab-bar {
  display: flex;
  align-items: center;
  justify-content: space-around;
  padding: 12px 24px calc(12px + var(--safe-bottom));
  background: var(--bg-card);
  box-shadow:
    0 -6px 16px var(--shadow-dark),
    0 -2px 0 rgba(255,255,255,0.15);
  position: relative;
  z-index: 50;
  flex-shrink: 0;
}
.tab-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  background: none;
  border: none;
  cursor: pointer;
  padding: 6px 16px;
  border-radius: 14px;
  transition: all 0.25s ease;
  color: var(--text-sec);
  position: relative;
}
.tab-btn.active { color: var(--accent); }
.tab-btn.active::before {
  content: '';
  position: absolute;
  top: -4px;
  left: 50%;
  transform: translateX(-50%);
  width: 20px;
  height: 3px;
  border-radius: 2px;
  background: linear-gradient(135deg, var(--accent), var(--accent-pink));
}
.tab-btn svg { width: 22px; height: 22px; fill: currentColor; }
.tab-btn span {
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: 0.3px;
  font-family: 'Outfit', sans-serif;
}

/* ===== FAB ===== */
.fab {
  position: absolute;
  bottom: calc(76px + var(--safe-bottom));
  right: 24px;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  z-index: 60;
  background: linear-gradient(135deg, var(--accent), var(--accent-pink));
  color: #fff;
  font-size: 30px;
  font-weight: 300;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow:
    6px 6px 14px var(--shadow-darker),
    -4px -4px 10px var(--shadow-light),
    0 4px 20px var(--accent-glow),
    inset 0 1px 0 rgba(255,255,255,0.25);
  transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  line-height: 1;
}
.fab:active {
  transform: scale(0.88);
  box-shadow:
    2px 2px 6px var(--shadow-darker),
    -2px -2px 4px var(--shadow-light),
    0 2px 10px var(--accent-glow);
}
.fab .plus {
  display: block;
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.fab.open .plus { transform: rotate(45deg); }

/* ===== DASHBOARD ===== */
.dash-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 0 18px;
}
.dash-header h1 {
  font-family: 'Outfit', sans-serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.3px;
}
.month-nav {
  display: flex;
  align-items: center;
  gap: 6px;
}
.month-nav button {
  width: 36px;
  height: 36px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg-card);
  color: var(--text-sec);
  font-size: 16px;
  box-shadow:
    3px 3px 6px var(--shadow-dark),
    -3px -3px 6px var(--shadow-light);
  transition: all 0.15s ease;
}
.month-nav button:active {
  box-shadow:
    inset 3px 3px 6px var(--shadow-dark),
    inset -3px -3px 6px var(--shadow-light);
}
.month-nav span {
  font-family: 'Outfit', sans-serif;
  font-weight: 600;
  font-size: 15px;
  min-width: 130px;
  text-align: center;
}

/* Summary card */
.summary-card {
  padding: 24px;
  margin-bottom: 20px;
  position: relative;
  overflow: hidden;
}
.summary-card::before {
  content: '';
  position: absolute;
  top: -30px;
  right: -30px;
  width: 120px;
  height: 120px;
  border-radius: 50%;
  background: linear-gradient(135deg, rgba(139,92,246,0.08), rgba(232,121,168,0.06));
  pointer-events: none;
}
.summary-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 16px;
}
.summary-amount {
  font-family: 'Outfit', sans-serif;
  font-size: 34px;
  font-weight: 800;
  letter-spacing: -1px;
  background: linear-gradient(135deg, var(--text) 30%, var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  line-height: 1.1;
}
.summary-sub {
  font-size: 13px;
  color: var(--text-sec);
  margin-top: 4px;
  font-weight: 400;
}
.summary-remaining {
  text-align: right;
}
.summary-remaining .val {
  font-family: 'Outfit', sans-serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--green);
}
.summary-remaining .val.negative { color: var(--coral); }
.summary-remaining .lbl {
  font-size: 11px;
  color: var(--text-sec);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* Progress bar */
.progress-track {
  height: 10px;
  border-radius: 8px;
  box-shadow: inset 3px 3px 5px var(--shadow-dark), inset -3px -3px 5px var(--shadow-light);
  background: var(--bg);
  overflow: hidden;
  position: relative;
}
.progress-fill {
  height: 100%;
  border-radius: 8px;
  background: linear-gradient(90deg, var(--accent), var(--accent-pink));
  transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
  position: relative;
}
.progress-fill.warning { background: linear-gradient(90deg, var(--coral), #F4A24C); }
.progress-fill.over { background: linear-gradient(90deg, var(--red), var(--coral)); }

/* Hero card — donut + summary merged */
.hero-card {
  padding: 24px 22px 20px;
  margin-bottom: 22px;
  position: relative;
  overflow: hidden;
}
.hero-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(139,92,246,0.07), rgba(232,121,168,0.05));
  pointer-events: none;
}
.hero-inner {
  display: flex;
  align-items: center;
  gap: 16px;
}
.donut-wrap {
  position: relative;
  flex-shrink: 0;
  width: 120px;
  height: 120px;
}
.donut-css {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  /* mask wycina środek — zostawia pierścień grubości ~28px */
  -webkit-mask: radial-gradient(circle, transparent 46px, black 47px);
  mask: radial-gradient(circle, transparent 46px, black 47px);
  animation: donutSpin 0.9s cubic-bezier(0.22, 1, 0.36, 1) both;
}
@keyframes donutSpin {
  from { opacity: 0; transform: scale(0.85) rotate(-30deg); }
  to   { opacity: 1; transform: scale(1)    rotate(0deg); }
}
.donut-center {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}
.donut-center-val {
  font-family: 'Outfit', sans-serif;
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -0.5px;
  line-height: 1;
  background: linear-gradient(135deg, var(--accent), var(--accent-pink));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.donut-center-sub {
  font-size: 8.5px;
  color: var(--text-sec);
  font-weight: 500;
  margin-top: 3px;
  letter-spacing: 0.2px;
}
.hero-right {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 0;
}
.hero-budget-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 6px;
}
.hero-budget-total {
  font-size: 11px;
  color: var(--text-sec);
  font-weight: 500;
}
.hero-remaining {
  font-family: 'Outfit', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--green);
}
.hero-remaining.negative { color: var(--coral); }
.hero-progress-track {
  height: 7px;
  border-radius: 6px;
  box-shadow: inset 3px 3px 5px var(--shadow-dark), inset -3px -3px 5px var(--shadow-light);
  background: var(--bg);
  overflow: hidden;
  margin-bottom: 16px;
}
.hero-progress-fill {
  height: 100%;
  border-radius: 6px;
  background: linear-gradient(90deg, var(--accent), var(--accent-pink));
  transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
}
.hero-progress-fill.warning { background: linear-gradient(90deg, var(--coral), #F4A24C); }
.hero-progress-fill.over    { background: linear-gradient(90deg, var(--red), var(--coral)); }
.donut-legend {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
}
.legend-dot {
  width: 8px;
  height: 8px;
  border-radius: 2px;
  flex-shrink: 0;
}
.legend-info { flex: 1; }
.legend-name {
  font-size: 11px;
  font-weight: 600;
  line-height: 1;
  color: var(--text);
}
.legend-amount {
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  font-weight: 700;
  line-height: 1.3;
}
.legend-pct {
  font-size: 10px;
  color: var(--text-sec);
  font-weight: 500;
  font-family: 'Outfit', sans-serif;
}
.person-chip.wspolne .legend-amount { color: var(--accent); }

}

}

.submit-btn {

  font-size: 16px;

}
.submit-btn.success {
  background: linear-gradient(135deg, var(--green), #66D99A);
}

/* Success flash */
@keyframes flashSuccess {
  0% { opacity: 0; transform: scale(0.5); }
  50% { opacity: 1; transform: scale(1.1); }
  100% { opacity: 0; transform: scale(1.3); }
}
.success-flash {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 60px;
  z-index: 200;
  pointer-events: none;
  opacity: 0;
}
.success-flash.show { animation: flashSuccess 0.7s ease-out forwards; }

.drill-overlay {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 80;
  opacity: 0;
  transform: translateX(100%);
  transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1);
  overflow-y: auto;
  padding: 0 20px calc(20px + var(--safe-bottom));
  max-width: 430px;
  left: 50%;
  margin-left: -215px;
}
@media (max-width: 430px) { .drill-overlay { left: 0; margin-left: 0; right: 0; } }
.drill-overlay.open { opacity: 1; transform: translateX(0); }
.drill-back {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 20px 0;
  background: none;
  border: none;
  cursor: pointer;
  font-family: 'Outfit', sans-serif;
  font-weight: 600;
  font-size: 15px;
  color: var(--accent);
}
.drill-back svg { width: 18px; height: 18px; fill: var(--accent); }
.drill-title {
  font-family: 'Outfit', sans-serif;
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 6px;
}
.drill-subtitle {
  font-size: 13px;
  color: var(--text-sec);
  margin-bottom: 20px;
}
.drill-expenses { display: flex; flex-direction: column; gap: 8px; }

/* Animation on load */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
.animate-in {
  animation: fadeInUp 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;
}

/* Ripple */
@keyframes ripple {
  from { transform: scale(0); opacity: 0.3; }
  to { transform: scale(4); opacity: 0; }
}
.ripple {
  position: absolute;
  border-radius: 50%;
  background: rgba(139,92,246,0.2);
  width: 40px;
  height: 40px;
  margin-left: -20px;
  margin-top: -20px;
  pointer-events: none;
  animation: ripple 0.5s ease-out forwards;
}

/* Donut chart animation */
@keyframes dashDraw {
  from { stroke-dashoffset: 339.3; }
}
.donut-seg { animation: dashDraw 0.9s cubic-bezier(0.22, 1, 0.36, 1) both; }

/* Smooth tab switch */
.screen { will-change: opacity, transform; }
.tab-btn { will-change: color; }

/* FAB pulse */
@keyframes fabPulse {
  0%, 100% { box-shadow: 6px 6px 14px var(--shadow-darker), -4px -4px 10px var(--shadow-light), 0 4px 20px var(--accent-glow), inset 0 1px 0 rgba(255,255,255,0.25); }
  50% { box-shadow: 6px 6px 14px var(--shadow-darker), -4px -4px 10px var(--shadow-light), 0 6px 28px rgba(139,92,246,0.4), inset 0 1px 0 rgba(255,255,255,0.25); }
}
.fab:not(.open) { animation: fabPulse 2.5s ease-in-out infinite; }
.fab.open { animation: none; }

let INCOME = parseInt(localStorage.getItem('income') || '9600');
// Wczytaj zapisane limity kategorii
(function() {
  const saved = JSON.parse(localStorage.getItem('catLimits') || '{}');
  CATEGORIES.forEach(c => { if (saved[c.id] !== undefined) c.plan = saved[c.id]; });
})();
const MONTHS_PL = ['Styczeń','Luty','Marzec','Kwiecień','Maj','Czerwiec','Lipiec','Sierpień','Wrzesień','Październik','Listopad','Grudzień'];

// State
let currentMonth = 2; // March (0-indexed)
let currentYear = 2026;
let selectedCat = null;
let selectedWho = 'Wspólne';
let activeFilter = 'Wszystko';
let searchQuery = '';

function getExpenses() {
  // Firebase + dane przykładowe
  const fb = window._fbExpenses || [];
  return [...SAMPLE_EXPENSES, ...fb];
}
async function addExpense(exp) {
  if (window._fbAddExpense) {
    await window._fbAddExpense(exp);
  }
}

function getMonthExpenses(month, year) {
  return getExpenses().filter(e => {
    const d = new Date(e.date);
    return d.getMonth() === month && d.getFullYear() === year;
  });
}

function getCatSpent(expenses, catId) {
  return expenses.filter(e => e.cat === catId).reduce((s, e) => s + e.amount, 0);
}

function formatMoney(n) {
  return n.toLocaleString('pl-PL', { maximumFractionDigits: 0 });
}

function progressClass(spent, plan) {
  if (plan === 0) return '';
  const pct = spent / plan;
  if (pct > 1) return 'over';
  if (pct > 0.85) return 'warning';
  return '';
}

// ===== RENDER DASHBOARD =====
function renderDashboard() {
  const expenses = getMonthExpenses(currentMonth, currentYear);
  const totalSpent = expenses.reduce((s, e) => s + e.amount, 0);
  const remaining = INCOME - totalSpent;
  const pct = Math.min((totalSpent / INCOME) * 100, 100);
  const mainClass = progressClass(totalSpent, INCOME);

  const wspolne = expenses.filter(e => e.who === 'Wspólne').reduce((s, e) => s + e.amount, 0);
  const damian = expenses.filter(e => e.who === 'Damian').reduce((s, e) => s + e.amount, 0);
  const monika = expenses.filter(e => e.who === 'Monika').reduce((s, e) => s + e.amount, 0);

  // Donut chart SVG
  const r = 44, cx = 60, cy = 60, circ = 2 * Math.PI * r;
  const safeTotal = totalSpent || 1;
  const segments = [
    { val: wspolne, color: '#8B5CF6', delay: 0 },
    { val: damian,  color: '#5B8DEF', delay: 0.12 },
    { val: monika,  color: '#E879A8', delay: 0.24 },
  ];
  let cumFrac = 0;
  const svgSegs = segments.map(seg => {
    const frac = seg.val / safeTotal;
    const dash = frac * circ;
    const gap = circ - dash;
    const dashOffset = circ * (1 - cumFrac) + circ * 0.25;
    const el = `<circle class="donut-seg" cx="${cx}" cy="${cy}" r="${r}"
      fill="none" stroke="${seg.color}" stroke-width="14"
      stroke-dasharray="${dash.toFixed(3)} ${gap.toFixed(3)}"
      stroke-dashoffset="${dashOffset.toFixed(3)}"
      stroke-linecap="round"
      style="animation-delay:${seg.delay}s"/>`;
    cumFrac += frac;
    return el;
  }).join('');

  let html = `
    <div class="dash-header animate-in">
      <h1>Budżet</h1>
      <div class="month-nav">
        <button id="prev-month">‹</button>
        <span>${MONTHS_PL[currentMonth]} ${currentYear}</span>
        <button id="next-month">›</button>
      </div>
    </div>
    <div class="hero-card neu-raised animate-in" style="animation-delay:0.05s">
      <div class="hero-inner">
        <div class="donut-wrap">
          <svg width="120" height="120" viewBox="0 0 120 120">
            <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--bg)" stroke-width="15"/>
            ${svgSegs}
          </svg>
          <div class="donut-center">
            <div class="donut-center-val">${formatMoney(totalSpent)}</div>
            <div class="donut-center-sub">zł wydano</div>
          </div>
        </div>
        <div class="hero-right">
          <div class="hero-budget-row">
            <span class="hero-budget-total">z ${formatMoney(INCOME)} zł</span>
            <span class="hero-remaining${remaining < 0 ? ' negative' : ''}">${remaining < 0 ? '-' : '+'}${formatMoney(Math.abs(remaining))} zł</span>
          </div>
          <div class="hero-progress-track">
            <div class="hero-progress-fill ${mainClass}" style="width:${pct}%"></div>
          </div>
          <div class="donut-legend">
            <div class="legend-item person-chip wspolne">
              <div class="legend-dot" style="background:#8B5CF6"></div>
              <div class="legend-info">
                <div class="legend-name">Wspólne</div>
                <div class="legend-amount">${formatMoney(wspolne)} zł</div>
              </div>
              <div class="legend-pct">${totalSpent ? Math.round(wspolne/totalSpent*100) : 0}%</div>
            </div>
            <div class="legend-item person-chip damian">
              <div class="legend-dot" style="background:#5B8DEF"></div>
              <div class="legend-info">
                <div class="legend-name">Damko</div>
                <div class="legend-amount">${formatMoney(damian)} zł</div>
              </div>
              <div class="legend-pct">${totalSpent ? Math.round(damian/totalSpent*100) : 0}%</div>
            </div>
            <div class="legend-item person-chip monika">
              <div class="legend-dot" style="background:#E879A8"></div>
              <div class="legend-info">
                <div class="legend-name">Moncia</div>
                <div class="legend-amount">${formatMoney(monika)} zł</div>
              </div>
              <div class="legend-pct">${totalSpent ? Math.round(monika/totalSpent*100) : 0}%</div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="section-title animate-in" style="animation-delay:0.15s">Kategorie</div>
    <div class="cat-list">
  `;

  CATEGORIES.forEach((cat, i) => {
    const spent = getCatSpent(expenses, cat.id);
    const pctCat = cat.plan > 0 ? Math.min((spent / cat.plan) * 100, 100) : 0;
    const cls = progressClass(spent, cat.plan);
    const over = spent > cat.plan;
    html += `
      <div class="cat-card neu-raised-sm ${over ? 'over-budget' : ''} animate-in" style="animation-delay:${0.18 + i * 0.03}s" data-cat="${cat.id}">
        <div class="cat-top">
          <div class="cat-info">
            <div class="cat-icon">${cat.icon}</div>
            <div class="cat-name">${cat.fullName || cat.name}</div>
          </div>
          <div class="cat-amounts">
            <div class="cat-spent">${formatMoney(spent)} zł</div>
            <div class="cat-plan">z ${formatMoney(cat.plan)} zł</div>
          </div>
        </div>
        <div class="cat-progress">
          <div class="cat-progress-fill ${cls}" style="width:${pctCat}%"></div>
        </div>
      </div>
    `;
  });

  html += '</div>';
  document.getElementById('screen-dashboard').innerHTML = html;

  document.getElementById('prev-month').onclick = () => {
    currentMonth--;
    if (currentMonth < 0) { currentMonth = 11; currentYear--; }
    renderDashboard();
  };
  document.getElementById('next-month').onclick = () => {
    currentMonth++;
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    renderDashboard();
  };

  document.querySelectorAll('.cat-card').forEach(el => {
    el.onclick = () => openDrill(el.dataset.cat);
  });
}

// ===== DRILL-DOWN =====
function openDrill(catId) {
  const cat = CATEGORIES.find(c => c.id === catId);
  const expenses = getMonthExpenses(currentMonth, currentYear).filter(e => e.cat === catId);
  const spent = expenses.reduce((s, e) => s + e.amount, 0);

  let html = `
    <button class="drill-back" id="drill-close">
      <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      Wróć
    </button>
    <div class="drill-title">${cat.icon} ${cat.fullName || cat.name}</div>
    <div class="drill-subtitle">${formatMoney(spent)} z ${formatMoney(cat.plan)} zł w ${MONTHS_PL[currentMonth]}</div>
    <div class="drill-expenses">
  `;

  if (expenses.length === 0) {
    html += '<div style="text-align:center;color:var(--text-sec);padding:40px 0;font-size:14px">Brak wydatków w tej kategorii</div>';
  }

  expenses.sort((a, b) => new Date(b.date) - new Date(a.date));
  expenses.forEach(e => {
    const whoClass = e.who === 'Wspólne' ? 'wspolne' : e.who === 'Damian' ? 'damian' : 'monika';
    const whoLabel = e.who === 'Damian' ? 'Damko' : e.who === 'Monika' ? 'Moncia' : 'Wspólne';
    html += `
      <div class="expense-row neu-raised-sm">
        <div class="exp-icon">${cat.icon}</div>
        <div class="exp-details">
          <div class="exp-cat">${e.desc || cat.name}</div>
          <div class="exp-desc">${formatDate(e.date)}</div>
        </div>
        <div class="exp-right">
          <div class="exp-amount">${formatMoney(e.amount)} zł</div>
          <div class="exp-who ${whoClass}">${whoLabel}</div>
        </div>
      </div>
    `;
  });

  html += '</div>';
  const overlay = document.getElementById('drill-overlay');
  overlay.innerHTML = html;
  overlay.classList.add('open');
  document.getElementById('drill-close').onclick = () => overlay.classList.remove('open');
}

// ===== RENDER HISTORY =====
function formatDate(dateStr) {
  const d = new Date(dateStr);
  const today = new Date('2026-03-18');
  const yesterday = new Date('2026-03-17');
  if (d.toDateString() === today.toDateString()) return 'Dziś';
  if (d.toDateString() === yesterday.toDateString()) return 'Wczoraj';
  return d.toLocaleDateString('pl-PL', { day: 'numeric', month: 'long', year: 'numeric' });
}

function formatDayHeader(dateStr) {
  return formatDate(dateStr);
}

function renderHistory() {
  let expenses = getMonthExpenses(currentMonth, currentYear);

  if (activeFilter !== 'Wszystko') {
    expenses = expenses.filter(e => e.who === activeFilter);
  }
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    expenses = expenses.filter(e => {
      const cat = CATEGORIES.find(c => c.id === e.cat);
      return (e.desc && e.desc.toLowerCase().includes(q)) ||
             (cat && cat.name.toLowerCase().includes(q));
    });
  }

  expenses.sort((a, b) => new Date(b.date) - new Date(a.date));

  const groups = {};
  expenses.forEach(e => {
    if (!groups[e.date]) groups[e.date] = [];
    groups[e.date].push(e);
  });

  let html = `
    <div class="history-header">
      <h1>Historia</h1>
    </div>
    <div class="search-bar neu-inset">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      <input type="text" placeholder="Szukaj wydatków..." id="search-input" value="${searchQuery}">
    </div>
    <div class="filter-chips">
      ${[['Wszystko','Wszystko'], ['Wspólne','Wspólne'], ['Damian','Damko'], ['Monika','Moncia']].map(([val,label]) =>
        `<button class="filter-chip ${activeFilter === val ? 'active' : ''}" data-filter="${val}">${label}</button>`
      ).join('')}
    </div>
  `;

  const dates = Object.keys(groups).sort((a, b) => new Date(b) - new Date(a));

  if (dates.length === 0) {
    html += '<div style="text-align:center;color:var(--text-sec);padding:40px 0;font-size:14px">Brak wydatków</div>';
  }

  dates.forEach(date => {
    html += `<div class="day-group">
      <div class="day-header">${formatDayHeader(date)}</div>`;
    groups[date].forEach(e => {
      const cat = CATEGORIES.find(c => c.id === e.cat) || { icon: '❓', name: '?' };
      const whoClass = e.who === 'Wspólne' ? 'wspolne' : e.who === 'Damian' ? 'damian' : 'monika';
      const whoLabel = e.who === 'Damian' ? 'Damko' : e.who === 'Monika' ? 'Moncia' : 'Wspólne';
      html += `
        <div class="expense-row neu-raised-sm">
          <div class="exp-icon">${cat.icon}</div>
          <div class="exp-details">
            <div class="exp-cat">${cat.fullName || cat.name}</div>
            <div class="exp-desc">${e.desc || ''}</div>
          </div>
          <div class="exp-right">
            <div class="exp-amount">${formatMoney(e.amount)} zł</div>
            <div class="exp-who ${whoClass}">${whoLabel}</div>
          </div>
        </div>
      `;
    });
    html += '</div>';
  });

  document.getElementById('screen-history').innerHTML = html;

  document.querySelectorAll('.filter-chip').forEach(el => {
    el.onclick = () => {
      activeFilter = el.dataset.filter;
      renderHistory();
    };
  });

  const searchEl = document.getElementById('search-input');
  if (searchEl) {
    searchEl.oninput = (e) => {
      searchQuery = e.target.value;
      renderHistory();
      const input = document.getElementById('search-input');
      if (input) { input.focus(); input.selectionStart = input.selectionEnd = input.value.length; }
    };
  }
}

// ===== RENDER SETTINGS =====
function renderSettings() {
  const savedIncome = parseInt(localStorage.getItem('income') || INCOME);
  const savedLimits = JSON.parse(localStorage.getItem('catLimits') || '{}');

  let html = `
    <div class="settings-header"><h1>Ustawienia</h1></div>
    <div class="setting-group">
      <div class="setting-group-title">Budżet</div>
      <div class="setting-card neu-raised-sm">
        <div class="setting-row">
          <div class="setting-label">Przychód miesięczny</div>
          <div class="setting-input-wrap">
            <input class="setting-input" id="income-input" type="text" value="${savedIncome}" inputmode="numeric" pattern="[0-9]*"/>
            <span class="setting-unit">zł</span>
          </div>
        </div>
      </div>
    </div>
    <div class="setting-group">
      <div class="setting-group-title">Limity kategorii</div>
      <div class="setting-card neu-raised-sm">
        ${CATEGORIES.map(c => `
          <div class="settings-cat-row">
            <div class="settings-cat-name">
              <span class="s-icon">${c.icon}</span>
              ${c.fullName || c.name}
            </div>
            <div class="setting-input-wrap">
              <input class="setting-input setting-input-sm" type="text" inputmode="numeric" pattern="[0-9]*"
                data-cat="${c.id}" value="${savedLimits[c.id] !== undefined ? savedLimits[c.id] : c.plan}"/>
              <span class="setting-unit">zł</span>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
    <div class="setting-group">
      <div class="setting-group-title">Para</div>
      <div class="pair-section">
        <div class="pair-card neu-raised-sm">
          <div class="pair-avatar">👤</div>
          <div class="pair-name">Damko</div>
        </div>
        <div class="pair-card neu-raised-sm">
          <div class="pair-avatar">👩</div>
          <div class="pair-name">Moncia</div>
        </div>
      </div>
    </div>
    <button class="settings-save-btn" id="settings-save">Zapisz zmiany</button>
    <div style="height:20px"></div>
  `;
  document.getElementById('screen-settings').innerHTML = html;

  document.getElementById('settings-save').onclick = () => {
    const newIncome = parseInt(document.getElementById('income-input').value) || INCOME;
    localStorage.setItem('income', newIncome);
    const newLimits = {};
    document.querySelectorAll('.setting-input[data-cat]').forEach(inp => {
      newLimits[inp.dataset.cat] = parseInt(inp.value) || 0;
    });
    localStorage.setItem('catLimits', JSON.stringify(newLimits));
    // Zaktualizuj runtime
    INCOME = newIncome;
    CATEGORIES.forEach(c => { if (newLimits[c.id] !== undefined) c.plan = newLimits[c.id]; });
    // Feedback
    const btn = document.getElementById('settings-save');
    btn.textContent = '✓ Zapisano!';
    btn.style.background = 'linear-gradient(135deg, #4CAF7D, #3d9e6b)';
    setTimeout(() => renderDashboard(), 300);
    setTimeout(() => renderSettings(), 800);
  };
}

// ===== RIPPLE =====
function addRipple(el, e) {
  const rect = el.getBoundingClientRect();
  const x = (e.clientX || rect.left + rect.width/2) - rect.left;
  const y = (e.clientY || rect.top + rect.height/2) - rect.top;
  const ripple = document.createElement('span');
  ripple.className = 'ripple';
  ripple.style.left = x + 'px';
  ripple.style.top = y + 'px';
  el.style.position = 'relative';
  el.style.overflow = 'hidden';
  el.appendChild(ripple);
  setTimeout(() => ripple.remove(), 500);
}

// ===== TABS =====
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.onclick = (e) => {
    addRipple(btn, e);
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const tab = btn.dataset.tab;
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    const screen = document.getElementById('screen-' + tab);
    screen.classList.add('active');
    screen.scrollTop = 0;
    if (tab === 'dashboard') renderDashboard();
    if (tab === 'history') renderHistory();
    if (tab === 'settings') renderSettings();
  };
});

// ===== ADD MODAL =====
const fab = document.getElementById('fab');
const modal = document.getElementById('add-modal');
const backdrop = document.getElementById('modal-backdrop');
const modalClose = document.getElementById('modal-close');

function openModal() {
  modal.classList.add('open');
  backdrop.classList.add('open');
  fab.classList.add('open');
  document.getElementById('inp-date').value = '2026-03-18';
  setTimeout(() => document.getElementById('inp-amount').focus(), 400);
}
function closeModal() {
  modal.classList.remove('open');
  backdrop.classList.remove('open');
  fab.classList.remove('open');
  resetForm();
}
function resetForm() {
  document.getElementById('inp-amount').value = '';
  document.getElementById('inp-desc').value = '';
  document.getElementById('inp-date').value = '2026-03-18';
  selectedCat = null;
  selectedWho = 'Wspólne';
  document.querySelectorAll('.cat-grid-item').forEach(el => el.classList.remove('selected'));
  document.querySelectorAll('.who-chip').forEach(el => {
    el.classList.toggle('active', el.dataset.who === 'Wspólne');
  });
}

fab.onclick = () => { if (modal.classList.contains('open')) closeModal(); else openModal(); };
backdrop.onclick = closeModal;
modalClose.onclick = closeModal;

// Category grid in modal
const catGrid = document.getElementById('cat-grid');
CATEGORIES.forEach(cat => {
  const btn = document.createElement('button');
  btn.className = 'cat-grid-item';
  btn.dataset.cat = cat.id;
  btn.innerHTML = `<span class="cg-icon">${cat.icon}</span><span class="cg-label">${cat.name}</span>`;
  btn.onclick = () => {
    document.querySelectorAll('.cat-grid-item').forEach(el => el.classList.remove('selected'));
    btn.classList.add('selected');
    selectedCat = cat.id;
  };
  catGrid.appendChild(btn);
});

// Who chips
document.querySelectorAll('.who-chip').forEach(el => {
  el.onclick = () => {
    document.querySelectorAll('.who-chip').forEach(w => w.classList.remove('active'));
    el.classList.add('active');
    selectedWho = el.dataset.who;
  };
});

// Submit
document.getElementById('btn-submit').onclick = async () => {
  const amount = parseFloat(document.getElementById('inp-amount').value);
  if (!amount || !selectedCat) {
    const btn = document.getElementById('btn-submit');
    btn.style.background = 'linear-gradient(135deg, var(--coral), #F4A24C)';
    setTimeout(() => btn.style.background = '', 600);
    return;
  }

  const btn = document.getElementById('btn-submit');
  btn.disabled = true;
  btn.textContent = 'Zapisuję...';

  const expense = {
    date: document.getElementById('inp-date').value,
    cat: selectedCat,
    desc: document.getElementById('inp-desc').value,
    amount: amount,
    who: selectedWho,
  };

  await addExpense(expense);

  // Success animation
  btn.disabled = false;
  btn.classList.add('success');
  btn.textContent = '✓ Dodano!';
  const flash = document.getElementById('success-flash');
  flash.classList.add('show');

  setTimeout(() => {
    btn.classList.remove('success');
    btn.textContent = 'Dodaj wydatek';
    flash.classList.remove('show');
    document.getElementById('inp-amount').value = '';
    document.getElementById('inp-desc').value = '';
    selectedCat = null;
    document.querySelectorAll('.cat-grid-item').forEach(el => el.classList.remove('selected'));
    document.getElementById('inp-amount').focus();
  }, 800);
};

// ===== INIT =====
renderDashboard();
renderHistory();
renderSettings();
</script>
